<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flora - Inscription</title>
    <link rel="stylesheet" href="assets/css/register.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="shortcut icon" href="assets/images/favicon.png" type="image/png">
</head>
<body>
    <div class="glass-container">
        <div class="login-box">
            <h2>Register</h2>
            <form action="php/register.php" method="POST">
                <div class="input-container">
                    <input type="text" id="username" name="username" required placeholder="Username" />
                    <i class="fas fa-user icon-right"></i>
                </div>
                <div class="input-container">
                    <input type="email" id="email" name="email" required placeholder="Email" />
                    <i class="fas fa-envelope icon-right"></i>
                </div>
                <div class="input-container">
                    <input type="password" id="password" name="password" required placeholder="Password" />
                    <i class="fas fa-lock icon-right"></i>
                </div>

                <div id="modal" class="modal-message hidden">
                    <p id="modal-message-text"></p>
                    <button type="button" id="closeModal">Fermer</button>
                </div>

                <button type="submit">Register</button>
                <p>Already have an account? <a href="index.html" id="login">Login</a></p>
            </form>
        </div>
    </div>

    <script>
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const status = params.get('status');
            const modal = document.getElementById('modal');
            const message = document.getElementById('modal-message-text');

            if (status === 'success') {
                message.textContent = "Inscription réussie ! Vous pouvez vous connecter.";
                modal.style.color = "#4BB543";
                modal.classList.remove('hidden');
            } else if (status === 'error') {
                message.textContent = "Erreur : cet utilisateur ou email existe déjà.";
                modal.style.color = "#ff4444";
                modal.classList.remove('hidden');
            }

            document.getElementById('closeModal').onclick = () => modal.classList.add('hidden');
        };
    </script>
</body>
</html>
