<script>
    function ajouterWishlist(nom, prix, image) {
        // Chemin vers php/ corrigé
        fetch('php/ajouter_wishlist.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                nom: nom,
                prix: prix,
                image: image
            })
        })
        .then(res => res.json())
        .then(data => {
            alert(data.message);
            // Mise à jour visuelle du panel (si présent)
            const panelList = document.querySelector('[data-side-panel="whishlist"] .panel-list');
            if(panelList) {
                const li = document.createElement('li');
                li.className = 'panel-item';
                li.innerHTML = `
                    <a href="#" class="panel-card">
                        <figure class="item-banner">
                            <img src="${image}" width="46" height="46" loading="lazy" alt="${nom}">
                        </figure>
                        <div>
                            <p class="item-title">${nom}</p>
                            <span class="item-value">$${prix.toFixed(2)} x1</span>
                        </div>
                    </a>`;
                panelList.appendChild(li);
            }
        })
        .catch(err => console.error("Erreur fetch:", err));
    }
</script>
