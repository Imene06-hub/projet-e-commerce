<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réinitialiser le mot de passe</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        integrity="sha512-KY4FZtu3Y5MoQStqIsZWEC8A2LXBc8Yh5rxidX84NUNy9wl1YB3nX6Z6g4sH+y8EFnQOPMbkMCuY1F3aSK6xvg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Flora</title>
    <!-- 
    - favicon
  -->
    <link rel="shortcut icon" href="./images/favicon.png" type="image/svg+xml">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: url('background-image.JPG');
            background-size: cover;
            background-position: center;
        }

        .glass-container {
            width: 100%;
            max-width: 400px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            border: 1.5px solid #ffffffcc;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .login-box {
            text-align: center;
        }

        h2 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 10px 40px 10px 12px;
            border: 1px solid #fff;
            background: transparent;
            border-radius: 20px;
            color: #fff;
            font-size: 14px;
        }

        .input-group input::placeholder {
            color: #f0f0f0;
        }

        .input-group i {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #fff;
        }

        input:focus {
            outline: none;
            border-color: #ddd;
        }

        button {
            background: #fff;
            color: #333;
            padding: 10px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }


        button:hover {
            background: transparent;
            color: #fff;
            border: 1px solid #fff;
        }

        .message {
            font-size: 13px;
            margin-top: 15px;
            color: #90ee90;
        }

        .error {
            color: #ff6b6b;
        }

        .login-link {
            margin-top: 20px;
            font-size: 13px;
            color: #fff;
        }

        .login-link a {
            color: #fff;
            font-weight: bold;
            text-decoration: underline;
            transition: color 0.3s;
        }

        .login-link a:hover {
            color: #ddd;
        }

        @media (max-width: 480px) {
            h2 {
                font-size: 1.2rem;
            }

            .glass-container {
                padding: 20px;
            }

            .input-group input {
                font-size: 13px;
            }

            button {
                font-size: 14px;
            }
        }
    </style>
</head>

<body>

    <div class="glass-container">
        <div class="login-box">
            <h2>Réinitialiser le mot de passe</h2>
            <form action="reset_password.php" method="POST">

                <div class="input-group">
                    <input type="email" name="email" placeholder="Votre adresse email" required />
                    <i class="fa-solid fa-envelope"></i>
                </div>

                <div class="input-group">
                    <input type="password" name="new_password" placeholder="Nouveau mot de passe" required />
                    <i class="fa-solid fa-lock"></i>
                </div>

                <div class="input-group">
                    <input type="password" name="confirm_password" placeholder="Confirmer le mot de passe" required />
                    <i class="fa-solid fa-lock"></i>
                </div>

                <button type="submit">Mettre à jour</button>
            </form>

            <div class="message" id="message">
                <!-- Message succès / erreur -->
            </div>

            <p class="login-link">Déjà un compte ? <a href="login.html">Se connecter</a></p>
        </div>
    </div>

</body>

</html>
